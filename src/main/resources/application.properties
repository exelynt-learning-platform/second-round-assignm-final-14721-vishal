# =============================================
# Application Basic Configuration
# =============================================
spring.application.name=e-commerce-system
server.port=8080
server.servlet.context-path=/

# =============================================
# Database Configuration
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration - SECURITY CRITICAL
# =============================================
# MUST set JWT_SECRET as environment variable in production
jwt.secret=${JWT_SECRET:yourSuperSecretKeyForJWTAtLeast256BitsLongChangeThisInProduction1234567890}
jwt.expiration=86400000

# =============================================
# Stripe Payment
# =============================================
# MUST set STRIPE_SECRET_KEY as environment variable in production
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_your_stripe_test_key_here}

# =============================================
# Logging
# =============================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.e_commerce_system=DEBUG

# =============================================
# Server & Misc
# =============================================
spring.mvc.hiddenmethod.filter.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.error.include-message=always
server.error.include-binding-errors=always