# =============================================
# Application Basic Configuration
# =============================================
spring.application.name=E-commerce_System
server.port=8080

# =============================================
# Database Configuration (MySQL)
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# =============================================
# JWT Configuration
# =============================================
# Change this secret key in production (minimum 256 bits / 32 characters)
# =============================================
# JWT Configuration
# =============================================
jwt.secret=yourSuperSecretKeyForJWTAtLeast256BitsLongChangeThisInProduction1234567890
jwt.expiration=86400000

# =============================================
# Stripe Payment
# =============================================
stripe.secret-key=sk_test_your_stripe_test_key_here
# =============================================
# Logging Configuration (Helpful for debugging)
# =============================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.ecommerce=DEBUG

# =============================================
# Server & Security Settings
# =============================================
server.servlet.context-path=/
spring.mvc.hiddenmethod.filter.enabled=true

# Optional: Increase max file size if you add image upload later
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB