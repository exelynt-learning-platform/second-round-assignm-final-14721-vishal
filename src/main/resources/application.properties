# =============================================
# Application Basic Configuration
# =============================================
spring.application.name=e-commerce-system
server.port=8080
server.servlet.context-path=/

# =============================================
# Database Configuration - SECURITY CRITICAL
# =============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration - SECURITY CRITICAL
# =============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =============================================
# Stripe Payment - SECURITY CRITICAL
# =============================================
stripe.secret-key=${STRIPE_SECRET_KEY}

# =============================================
# Security Hardening
# =============================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=never

# =============================================
# Logging (Production-friendly)
# =============================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.com.example.e_commerce_system=INFO

# =============================================
# Server & Misc
# =============================================
spring.mvc.hiddenmethod.filter.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB